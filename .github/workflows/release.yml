name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: dotnet publish app/WgAutoconnect.csproj -c Release -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Update installer version
        shell: pwsh
        run: |
          $content = Get-Content installer/setup.iss -Raw
          $content = $content -replace '#define MyAppVersion "1.0.0"', "#define MyAppVersion `"${{ steps.version.outputs.VERSION }}`""
          Set-Content installer/setup.iss $content

      - name: Build Installer
        run: iscc installer/setup.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/bin/Release/net8.0-windows/win-x64/publish/WG-Autoconnect.exe
            installer/output/WG-Autoconnect-Setup.exe
